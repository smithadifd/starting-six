# Production Docker Compose for Starting Six
# Deployment: Synology NAS via docker-compose v1 CLI
#
# Usage:
#   docker-compose -f docker-compose.prod.yml --env-file .env.production up -d

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        - NEXT_PUBLIC_APP_URL=${APP_URL:-https://starting-six.home}
    container_name: starting_six_app
    environment:
      - DATABASE_URL=/app/data/starting-six.db
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${APP_URL:-https://starting-six.home}
      - NEXT_PUBLIC_APP_URL=${APP_URL:-https://starting-six.home}
    volumes:
      - starting_six_data:/app/data
    ports:
      - "3002:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  starting_six_data:
    name: starting_six_data