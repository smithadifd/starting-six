# Demo Docker Compose for Starting Six
# Deployment: AWS EC2 demo server
#
# Usage:
#   docker compose -f docker-compose.demo.yml up -d --build

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        - NEXT_PUBLIC_APP_URL=https://starting-six.smithadifd.com
    container_name: starting_six_demo
    environment:
      - DATABASE_URL=/app/data/starting-six.db
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=https://starting-six.smithadifd.com
      - NEXT_PUBLIC_APP_URL=https://starting-six.smithadifd.com
      - DEMO_MODE=true
      - NEXT_PUBLIC_DEMO_MODE=true
    volumes:
      - starting_six_demo_data:/app/data
    ports:
      - "3012:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 150M

volumes:
  starting_six_demo_data:
    name: starting_six_demo_data
